name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      REDIS_URL: redis://localhost:6379

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run tsc --workspaces --if-present

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Unit tests
        run: npm run test --workspaces --if-present -- --testPathIgnorePatterns="src/__tests__/e2e"

      - name: E2E tests (WebSocket integration — requires Redis)
        run: npm run test:e2e --workspace=apps/api

      - name: Build
        run: npm run build --workspaces --if-present

      - name: Bundle size gate
        run: |
          BYTES=$(find packages/speech-widget/dist -name "*.js" | xargs gzip -c | wc -c)
          echo "Bundle size: ${BYTES} bytes (limit: 51200)"
          if [ "$BYTES" -gt 51200 ]; then
            echo "❌ Bundle exceeds 50KB gzip limit"
            exit 1
          fi
          echo "✅ Bundle within limit"

      - name: API key check
        run: |
          if grep -r "DEEPGRAM_API_KEY" packages/speech-widget/dist 2>/dev/null; then
            echo "❌ DEEPGRAM_API_KEY found in widget bundle!"
            exit 1
          fi
          echo "✅ No API key in bundle"

  # ── Playwright browser E2E ──────────────────────────────────────────────────
  # Runs after the main ci job so we don't spin up a browser on every lint failure.
  playwright:
    runs-on: ubuntu-latest
    needs: [ci]

    env:
      REDIS_URL: redis://localhost:6379

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium + system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (browser cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npm run test:pw

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
