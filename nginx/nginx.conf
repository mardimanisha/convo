# nginx.conf — WebSocket load balancer for the voice-adapter load test (P5-3)
#
# Sticky session routing by X-Session-Id header (CLAUDE.md §15.6, ADR-06):
#   The widget (WsTransport) sets X-Session-Id on every WS upgrade request.
#   Nginx hashes this header to route each client consistently to the same
#   api instance — ensuring the Deepgram session and the client WebSocket
#   land on the same Node.js process.
#
# Why this matters (ADR-06):
#   RelayService subscribes to Redis pub/sub for transcripts from OTHER instances.
#   Without sticky routing, a reconnecting client may hit a different instance
#   that doesn't hold the active Deepgram session. The Redis bridge handles this,
#   but consistent routing avoids the extra pub/sub hop entirely.

events {
  # Support up to 10,000 concurrent connections per worker
  worker_connections 10240;
}

http {
  upstream api_backend {
    # Consistent hash on X-Session-Id — same session always hits same instance.
    # Falls back to round-robin for connections without the header.
    hash $http_x_session_id consistent;

    # Docker resolves 'api' to all scaled replicas (api_1, api_2, ...) via
    # the internal DNS when using --scale.
    server api:3000;
  }

  server {
    listen 80;

    location / {
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;

      # WebSocket upgrade
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";

      # Forward headers the backend uses for routing and logging
      proxy_set_header   X-Session-Id    $http_x_session_id;
      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

      # Long read/send timeouts — WebSocket sessions run for up to 5+ seconds
      # under load. The default 60s proxy timeout is sufficient, but we set
      # explicit values for clarity.
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }
  }
}
